<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box { 
            background: white; 
            padding: 40px 35px; 
            border-radius: 15px; 
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { 
            text-align: center; 
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 28px;
        }
        .icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
        }
        label { 
            display: block; 
            margin-top: 18px; 
            font-weight: bold;
            color: #34495e;
            font-size: 15px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            padding: 14px; 
            font-size: 17px; 
            cursor: pointer; 
            border-radius: 8px; 
            margin-top: 25px;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.02); }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .demo-info {
            background: #e8f4f8;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #2c3e50;
            text-align: center;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">👨‍⚕️</div>
        <h2>Doctor Login</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <label>Username:</label>
            <input type="text" name="username" placeholder="doctor" required>
            
            <label>Password:</label>
            <input type="password" name="password" placeholder="1234" required>
            
            <button class="btn">Login Kare</button>
        </form>
        
        <div class="demo-info">
            <b>Demo Login:</b><br>
            Username: doctor<br>
            Password: 1234
        </div>
        
        <a href="{{ url_for('index') }}" class="back-link">← Wapas Home</a>
    </div>
</body>
</html>
