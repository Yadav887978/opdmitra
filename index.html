<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPD Mitra - Patient Registration</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f4; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            max-width: 500px; 
            width: 100%;
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-bottom: 30px;
        }
        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold;
            color: #555;
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 18px;
            cursor: pointer; 
        }
        button:hover { 
            background: #218838; 
        }
        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>OPD Mitra - Patient Registration</h2>
        
        <form method="POST" action="/register">
            <label>Name:</label>
            <input type="text" name="patient_name" placeholder="Enter full name" required>
            
            <label>Age:</label>
            <input type="number" name="patient_age" placeholder="Enter age" required>
            
            <label>Gender:</label>
            <select name="patient_gender" required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
            
            <label>Phone:</label>
            <input type="tel" name="patient_phone" placeholder="Enter 10 digit mobile number" pattern="[0-9]{10}" required>
            
            <label>Disease/Symptoms:</label>
            <select name="patient_disease" required>
                <option value="">Select Disease</option>
                <option value="Fever">Fever</option>
                <option value="Cold & Cough">Cold & Cough</option>
                <option value="Headache">Headache</option>
                <option value="Stomach Pain">Stomach Pain</option>
                <option value="Body Pain">Body Pain</option>
                <option value="Diabetes">Diabetes</option>
                <option value="Blood Pressure">Blood Pressure</option>
                <option value="Other">Other</option>
            </select>
            
            <label>Hospital:</label>
            <select name="patient_hospital" required>
                <option value="">Select Hospital</option>
                <option value="GT Hospital Mumbai">GT Hospital Mumbai</option>
                <option value="KEM Hospital">KEM Hospital</option>
                <option value="JJ Hospital">JJ Hospital</option>
                <option value="Nair Hospital">Nair Hospital</option>
            </select>
            
            <button type="submit">Generate Token</button>
        </form>
    </div>
</body>
</html>
